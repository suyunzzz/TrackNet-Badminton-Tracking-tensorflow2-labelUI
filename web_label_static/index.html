<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrackNet Web Label</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar card">
        <div>
          <p class="eyebrow">TrackNet 标注器</p>
          <h1>网页标注界面</h1>
          <div class="meta-list">
            <div><span>视频文件</span><strong id="videoName">-</strong></div>
            <div><span>标注文件</span><strong id="csvPath">-</strong></div>
          </div>
        </div>
        <div class="progress-panel">
          <div class="progress-header">
            <span>标注进度</span>
            <strong id="progressText">0 / 0</strong>
          </div>
          <div class="progress-bar"><div id="progressFill"></div></div>
          <div class="progress-meta">
            <span id="percentText">0%</span>
            <span id="dirtyText">已保存</span>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="viewer card">
          <div class="viewer-toolbar">
            <div class="frame-summary">
              <strong id="frameIndicator">Frame 0 / 0</strong>
              <span id="frameStatus" class="status-pill">未标注</span>
            </div>
            <div class="actions compact">
              <button id="saveBtn" class="primary">保存 (S)</button>
              <button id="clearBtn">标记无球 (C)</button>
              <button id="nextUnlabeledBtn">下一未标注 (U)</button>
            </div>
          </div>

          <div class="canvas-wrap">
            <canvas id="frameCanvas"></canvas>
            <div id="loadingMask" class="loading-mask">正在加载帧...</div>
          </div>

          <div class="tips">
            <span>左键点击：标注球心</span>
            <span>右键点击：标记当前帧无球</span>
            <span>Shift + 左右方向键：快进/快退 36 帧</span>
          </div>
        </section>

        <aside class="sidebar card">
          <section>
            <h2>导航</h2>
            <div class="actions grid-3">
              <button id="firstBtn">首帧 (⌘←)</button>
              <button id="prevFastBtn">-36</button>
              <button id="prevBtn">上一帧 (←)</button>
              <button id="nextBtn">下一帧 (→)</button>
              <button id="nextFastBtn">+36</button>
              <button id="lastBtn">末帧 (⌘→)</button>
            </div>
          </section>

          <section>
            <h2>定位</h2>
            <div class="field-row">
              <label for="frameSlider">帧滑块</label>
              <input id="frameSlider" type="range" min="0" max="0" value="0" />
            </div>
            <div class="field-row inline">
              <label for="frameInput">跳转帧</label>
              <input id="frameInput" type="number" min="0" step="1" value="0" />
              <button id="jumpBtn">跳转</button>
            </div>
          </section>

          <section>
            <h2>当前标注</h2>
            <div class="meta-card">
              <div><span>Ball</span><strong id="ballValue">0</strong></div>
              <div><span>x</span><strong id="xValue">-1.000</strong></div>
              <div><span>y</span><strong id="yValue">-1.000</strong></div>
            </div>
          </section>

          <section>
            <h2>快捷键</h2>
            <ul class="shortcut-list">
              <li><kbd>←</kbd> / <kbd>→</kbd> 上一帧 / 下一帧</li>
              <li><kbd>Shift</kbd> + <kbd>←</kbd> / <kbd>→</kbd> 快退 / 快进 36 帧</li>
              <li><kbd>⌘</kbd> + <kbd>←</kbd> / <kbd>→</kbd> 首帧 / 末帧</li>
              <li><kbd>[</kbd> / <kbd>]</kbd> 首帧 / 末帧（备用）</li>
              <li><kbd>S</kbd> 保存，<kbd>C</kbd> 标记无球，<kbd>U</kbd> 下一未标注</li>
            </ul>
          </section>
        </aside>
      </main>
    </div>

    <div id="toast" class="toast"></div>
    <script src="/static/app.js"></script>
  </body>
</html>
